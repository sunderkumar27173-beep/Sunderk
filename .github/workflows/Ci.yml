name: Project Phoenix CI Gatekeeper

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x' # Use the version matching your local environment

    - name: Install Dependencies
      run: npm install

    - name: Run Application Tests
      run: npm test